{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delete Customer #{{ customer.id }} - Expert Life</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="{% static 'home.css' %}" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold fs-3 text-white" href="#">EXPERT LIFE</a>
      </div>
    </nav>

    <div class="container my-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="mb-3">Delete Customer #{{ customer.id }}?</h2>
          <p class="text-muted">This action cannot be undone.</p>

          <div class="alert alert-danger">
            <strong>Customer:</strong> {{ customer.name }}<br />
            <strong>Email:</strong> {{ customer.email }}<br />
            <strong>Phone:</strong> {{ customer.phone|default:'—' }}
          </div>

          <form
            method="post"
            action="{% url 'feature:customer_delete' customer.id %}"
          >
            {% csrf_token %}
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-danger">
                <i class="fas fa-trash me-1"></i> Delete
              </button>
              <a
                href="{% url 'feature:customer_detail' customer.id %}"
                class="btn btn-outline-secondary"
              >
                Cancel
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
