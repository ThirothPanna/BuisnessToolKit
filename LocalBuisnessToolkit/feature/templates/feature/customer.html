<!-- ✅ ADD CUSTOMER MODAL ✅ -->
<div class="modal fade" id="addCustomerModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title">
          <i class="fas fa-user-plus me-2"></i>Add New Customer
        </h5>
        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="modal"
        ></button>
      </div>
      <form method="POST" action="{% url 'feature:add_customer' %}">
        {% csrf_token %}
        <div class="modal-body">
          <div class="mb-3">
            <label for="customerName" class="form-label fw-bold"
              >Full Name *</label
            >
            <input
              type="text"
              class="form-control"
              id="customerName"
              name="name"
              required
            />
          </div>
          <div class="mb-3">
            <label for="customerEmail" class="form-label fw-bold"
              >Email Address *</label
            >
            <input
              type="email"
              class="form-control"
              id="customerEmail"
              name="email"
              required
            />
          </div>
          <div class="mb-3">
            <label for="customerPhone" class="form-label fw-bold"
              >Phone Number</label
            >
            <input
              type="text"
              class="form-control"
              id="customerPhone"
              name="phone"
            />
          </div>
          <!-- REMOVE THIS ENTIRE ADDRESS SECTION -->
          <!--
          <div class="mb-3">
            <label for="customerAddress" class="form-label fw-bold">Address</label>
            <textarea class="form-control" id="customerAddress" name="address" rows="2"></textarea>
          </div>
          -->
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
          >
            Cancel
          </button>
          <button type="submit" class="btn btn-success">
            <i class="fas fa-save me-1"></i>Save Customer
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
